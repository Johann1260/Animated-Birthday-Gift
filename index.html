<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="title" content="Happy Birthday Website 2.0 | Aoudumber Bade">
  <meta name="github" content="https://github.com/Aoudumber-Bade">
  <title>Birthday Gift Animation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
  <div id="wrapper">
    <div class="flag__birthday">
      <img src="/Images/1.png" alt="" width="350" class="flag__left">
      <img src="/Images/1.png" alt="" width="350" class="flag__right">
    </div>

    <div class="content">
      <div class="left">
        <div class="title">
          <h1 class="happy">
            <span style="--t: 3.33s;">J</span>
            <span style="--t: 3.5s;">o</span>
            <span style="--t: 3.67s;">y</span>
            <span style="--t: 3.83s;">e</span>
            <span style="--t: 4s;">u</span>
            <span style="--t: 4.17s;">x</span>
          </h1>
          <h1 class="birthday">
            <span style="--t: 4.17s;">A</span>
            <span style="--t: 4.33s;">n</span>
            <span style="--t: 4.5s;">n</span>
            <span style="--t: 4.67s;">i</span>
            <span style="--t: 4.83s;">v</span>
            <span style="--t: 5s;"> !</span>
            <span style="--t: 5.17s;">!</span>
          </h1>
          <div class="hat">
            <img src="/Images/hat.png" alt="" width="130">
          </div>
        </div>

        <div class="date__of__birth">
          <span></span>
        </div>

        <div class="btn">
          <button id="btn__letter">
            Clique ici 
            <i class="fa-regular fa-envelope"></i>
          </button>
        </div>
      </div>

      <div class="right">
        <div class="box__account">
          <div class="image">
            <img src="/Images/img.png" alt="">
          </div>
          <div class="name">
            <i class="fa-solid fa-heart"></i>
            <span>Agnès</span>
            <i class="fa-solid fa-heart"></i>
          </div>
          <div class="balloon_one">
            <img width="100px" src="/Images/balloon1.png" alt="">
          </div>
          <div class="balloon_two">
            <img width="100px" src="/Images/balloon2.png" alt="">
          </div>
        </div>

        <div class="cricle">
          <div class="text__cricle">
            <span style="--i: 1;">h</span><span style="--i: 2;">a</span><span style="--i: 3;">p</span>
            <span style="--i: 4;">p</span><span style="--i: 5;">y</span><span style="--i: 6;">-</span>
            <span style="--i: 7;">b</span><span style="--i: 8;">i</span><span style="--i: 9;">r</span>
            <span style="--i: 10;">t</span><span style="--i: 11;">h</span><span style="--i: 12;">d</span>
            <span style="--i: 13;">a</span><span style="--i: 14;">y</span><span style="--i: 15;">-</span>
          </div>
          <i class="fa-solid fa-heart"></i>
        </div>
      </div>
    </div>

    <div class="decorate_star star1" style="--t: 12.5s;"></div>
    <div class="decorate_star star2" style="--t: 12.67s;"></div>
    <div class="decorate_star star3" style="--t: 12.83s;"></div>
    <div class="decorate_star star4" style="--t: 13s;"></div>
    <div class="decorate_star star5" style="--t: 13.17s;"></div>

    <div class="decorate_flower--one" style="--t: 12.5s;">
      <img width="20" src="/Images/decorate_flower.png" alt="">
    </div>
    <div class="decorate_flower--two" style="--t: 12.75s;">
      <img width="20" src="/Images/decorate_flower.png" alt="">
    </div>
    <div class="decorate_flower--three" style="--t: 13s;">
      <img width="20" src="/Images/decorate_flower.png" alt="">
    </div>

    <div class="decorate_bottom">
      <img src="/Images/decorate.png" alt="" width="100">
    </div>
    <div class="smiley__icon">
      <img src="/Images/smiley_icon.png" alt="" width="100">
    </div>

    <!-- Letter Box -->
    <div class="box__letter">
      <div class="letter__border">
        <div class="letter">
          <div class="title__letter"></div>
          <div class="content__letter">
            <div class="left">
              <img id="heart__letter" src="https://media0.giphy.com/media/c76IJLufpNwSULPk77/giphy.gif" alt="">
              <img class="heart heart_1" style="--t: 0.17s" width="20" src="/Images/heart.png" alt="">
              <img class="heart heart_2" style="--t: 0.33s" width="20" src="/Images/heart.png" alt="">
              <img class="heart heart_3" style="--t: 0.5s" width="20" src="/Images/heart.png" alt="">
              <img class="heart heart_4" style="--t: 0.67s" width="20" src="/Images/heart.png" alt="">
            </div>
            <div class="right">
              <div class="love__img">
                <img src="https://media4.giphy.com/media/W4jyjmIpnw6e38B6Qc/giphy.gif" alt="" width="220">
              </div>
              <div class="text__letter">
                <p></p>
              </div>
              <img id="mewmew" width="80" src="/Images/mewmew.gif" alt="">
            </div>
          </div>
        </div>
        <div class="close">
          <i class="fa-solid fa-xmark"></i>
        </div>
      </div>
    </div>
  </div>

  <script>
    let datetxt = "08 Mai 2026";
    let datatxtletter = "\nTu es une fille vraiment spéciale. Que le Seigneur te comble de grâces et nous permette de fêter encore de nombreux anniversaires ensemble.\nJoyeux anniversaire !💕\nAh, et pour le cadeau… ce petit message sur ce site est ton seul cadeau.";
    let titleLetter = "A mon amie";

    let charArrDate = datetxt.split('');
    let charArrDateLetter = datatxtletter.split('');
    let charArrTitle = titleLetter.split('');
    let currentIndex = 0, currentIndexLetter = 0, currentIndexTitle = 0;

    let date__of__birth = document.querySelector(".date__of__birth span");
    let text__letter = document.querySelector(".text__letter p");

    setTimeout(() => {
      let timeDatetxt = setInterval(() => {
        if (currentIndex < charArrDate.length) {
          date__of__birth.textContent += charArrDate[currentIndex];
          currentIndex++;
        } else {
          let i = document.createElement("i");
          i.className = "fa-solid fa-star";
          document.querySelector(".date__of__birth").prepend(i);
          document.querySelector(".date__of__birth").appendChild(i.cloneNode(true));
          clearInterval(timeDatetxt);
        }
      }, 100);
    }, 10000);   // ← accéléré

    $("#btn__letter").on("click", function(){
      $(".box__letter").slideDown();
      setTimeout(() => $(".letter__border").slideDown(), 833);
      setTimeout(() => {
        let intervalTitle = setInterval(() => {
          if (currentIndexTitle < charArrTitle.length) {
            document.querySelector(".title__letter").textContent += charArrTitle[currentIndexTitle];
            let i = document.createElement("i");
            i.className = "fa-solid fa-heart";
            document.querySelector(".title__letter").appendChild(i);
            currentIndexTitle++;
          } else clearInterval(intervalTitle);
        }, 100);
      }, 1667);
      setTimeout(() => {
        document.querySelector("#heart__letter").classList.add("animationOp");
        document.querySelector(".love__img").classList.add("animationOp");
        document.querySelector("#mewmew").classList.add("animationOp");
      }, 2333);
      setTimeout(() => document.querySelectorAll(".heart").forEach(item => item.classList.add("animation")), 2917);
      setTimeout(() => {
        let intervalContent = setInterval(() => {
          if (currentIndexLetter < charArrDateLetter.length) {
            text__letter.textContent += charArrDateLetter[currentIndexLetter];
            currentIndexLetter++;
          } else clearInterval(intervalContent);
        }, 50);
      }, 5000);
    });

    $(".close").on("click", function(){
      document.querySelector(".title__letter").textContent = "";
      text__letter.textContent = "";
      currentIndexLetter = currentIndexTitle = 0;
      document.querySelector("#heart__letter").classList.remove("animationOp");
      document.querySelector(".love__img").classList.remove("animationOp");
      document.querySelector("#mewmew").classList.remove("animationOp");
      document.querySelectorAll(".heart").forEach(item => item.classList.remove("animation"));
      $(".box__letter").slideUp();
      $(".letter__border").slideUp();
    });
  </script>
</body>
</html>
